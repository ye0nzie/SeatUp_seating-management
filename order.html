<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order</title>
    <link rel="stylesheet" href="styleDefault.css">
    <link rel="stylesheet" href="order.css">
</head>
<body>
    <div id="header"></div>

    <div class="ticket-card">

        <div class="ticket-info">
            <h3>Argo Cirebon</h3>
            <p>Eksekutif</p>
    
            <div class="route">
                <div>
                    <h4>Stasiun Gambir</h4>
                    <p>Jakarta</p>
                </div>
    
                <span>──────→</span>
    
                <div>
                    <h4>Stasiun Bekasi</h4>
                    <p>Bekasi</p>
                </div>
            </div>
        </div>
    
        <div class="ticket-price">
            <h3>IDR 125.000</h3>
            <p>incl tax</p>
    
            <button onclick="window.location.href='order.html'">
                PESAN
            </button>
        </div>
    
    </div>

    <div class="form-section">
        <h2 class="section-title">KONTAK PENGGUNA</h2>

        <div class="card-box">
            <div class="title-radio-group">
                <div class="radio-container">
                    <div class="radio-container">
                        <input type="radio" name="passenger-title-profile" id="passenger-title-tn" value="Tn">
                        <label>Tn.</label>
                    </div>
                    <div class="radio-container">
                        <input type="radio" name="passenger-title-profile" id="passenger-title-ny" value="Ny" checked>
                        <label>Ny.</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="contact-name" value="Soneil Marc" placeholder="Nama Lengkap" >
            </div>

            <div class="form-group">
                <label>Nomor Telepon</label>
                <input type="text" id="contact-phone" value="081212345567" placeholder="Nomor Telepon" >
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="contact-email" value="SoneMarc@gmail.com" placeholder="Alamat Email" >
                <p class="helper-text"><span class="required-star">*</span> E-tiket akan dikirim ke email berikut</p>
            </div>
        </div>
    </div>

    <div class="form-section">
        <form id="orderForm" class="order-box" action="seat.html"> 
            <div class="section-header-row">
                <h2 class="section-title">DETAIL PENUMPANG</h2>
            </div>
        
            <div class="card-box">
            
                <div class="title-radio-group">
                    <div class="radio-container">
                        <input type="radio" name="passenger-title" id="passenger-title-tn" value="Tn">
                        <label>Tn.</label>
                    </div>
                    <div class="radio-container">
                        <input type="radio" name="passenger-title" id="passenger-title-ny" value="Ny">
                        <label>Ny.</label>
                    </div>
                </div>
            
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="name" placeholder="Nama Lengkap">
                </div>
            
                <div class="identity-section">
                    <label class="identity-label">Kartu Identitas</label>
                    
            
                    <div class="id-radio-group">
                        <div class="radio-container">
                            <input type="radio" name="id-type" value="KTP">
                            <label>KTP</label>
                        </div>
                        <div class="radio-container">
                            <input type="radio" name="id-type" value="Paspor">
                            <label>Paspor</label>
                        </div>
                    </div>
              
                    <div class="form-group">
                        <label>Nomor Identitas</label>
                        <input type="text" id="passenger-id" placeholder="Nomor Identitas">
                    </div>
                </div>
            </div>

            <div class="submit-container">
                <button type="submit" class="btn-submit">PESAN SEKARANG</button>
            </div>
        </form>
    </div>

    <script src="order.js"></script>
    <script src="auth.js"></script>

    <div id="footer"></div>
    <script src="default.js"></script>
</body>
</html>
