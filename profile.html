<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="css/styleDefault.css">

<body>

    <div class="profile-card">

        <img class="avatar" src="Source/profile.png">

                </p>

        </div>
    
        <div class="right">
    
            <h2>Login Activity</h2>

                <p>MacBook Pro M4 • Bandung</p>
            </div>
    
            <div class="activity">
                <p>iPhone 15 Pro • Bandung</p>
            </div>

    <script src="js/default.js"></script>
