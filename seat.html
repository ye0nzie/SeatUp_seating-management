<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Plan</title>
    <link rel="stylesheet" href="css/styleDefault.css">
    <link rel="stylesheet" href="css/styleSeat.css">
</head>
<body>
    <div id="header"></div>

    <div class="legend">
        <div class="item">
            <span class="seat available"></span>
            <p>Tersedia</p>
        </div>
        <div class="item">
            <span class="seat male">L</span>
            <p>Laki-laki</p>
        </div>
        <div class="item">
            <span class="seat female">P</span>
            <p>Perempuan</p>
        </div>
    </div>
    
    <div class="main-container">
    
        <div class="train-layout">
            <div class="row">
                <span class="row-number">1</span>
                <div class="seat male">L</div>
                <div class="seat available"></div>
                <div class="seat male">L</div>
                <div class="seat available"></div>
                <div class="seat female">P</div>
                <div class="seat available"></div>
            </div>
            <div class="row">
                <span class="row-number">2</span>
                <div class="seat female">P</div>
                <div class="seat female">P</div>
                <div class="seat available"></div>
                <div class="seat male">L</div>
                <div class="seat available"></div>
                <div class="seat male">P</div>
            </div>
            <div class="row">
                <span class="row-number">3</span>
                <div class="seat male">L</div>
                <div class="seat female">P</div>
                <div class="seat male">L</div>
                <div class="seat female">P</div>
                <div class="seat male">L</div>
                <div class="seat available"></div>
            </div>
            <div class="row">
                <span class="row-number">4</span>
                <div class="seat male">P</div>
                <div class="seat female">P</div>
                <div class="seat male">L</div>
                <div class="seat female">P</div>
                <div class="seat female">P</div>
                <div class="seat available"></div>
            </div>
            <div class="row">
                <span class="row-number">5</span>
                <div class="seat available"></div>
                <div class="seat female">P</div>
                <div class="seat available"></div>
                <div class="seat available"></div>
                <div class="seat available"></div>
                <div class="seat male">L</div>
            </div>
            <div class="row">
                <span class="row-number">6</span>
                <div class="seat female">P</div>
                <div class="seat female">P</div>
                <div class="seat male">L</div>
                <div class="seat available"></div>
                <div class="seat female">P</div>
                <div class="seat available"></div>
            </div>
            <div class="row">
                <span class="row-number">7</span>
                <div class="seat available"></div>
                <div class="seat female">P</div>
                <div class="seat available"></div>
                <div class="seat available"></div>
                <div class="seat available"></div>
                <div class="seat female">P</div>
            </div>
            <div class="row">
                <span class="row-number">8</span>
                <div class="seat available"></div>
                <div class="seat female">P</div>
                <div class="seat male">L</div>
                <div class="seat male">L</div> 
                <div class="seat available"></div>
                <div class="seat male">L</div>
            </div>
        </div> 
        
        <div class="side-panel-right">
            <div class="ticket-card">
                <div class="ticket-info">
                    <h3>Argo Cirebon</h3>
                    <p>Eksekutif</p>

                    <div class="route">
                        <div>
                            <h4>Stasiun Gambir</h4>
                            <p>Jakarta</p>
                        </div>
                        <span>──────→</span>
                        <div>
                            <h4>Stasiun Bekasi</h4>
                            <p>Bekasi</p>
                        </div>
                    </div>
                </div>
        
                <div class="ticket-price">
                    <h3>IDR 125.000</h3>
                    <p>incl tax</p>
                </div>
            </div>
        </div> 
    </div> 

    <div class="submit-container">
        <button id="btn-next" type="submit" class="btn-submit">PESAN SEKARANG</button>
    </div>
    
    <div id="footer"></div>
    <script src="js/default.js"></script>
    <script src="js/auth.js"></script>

    <script src="js/seat.js"></script>
</body>
</html>
