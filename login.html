<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/styleLogin.css">
</head>
<body>
    <div class="login">

        <div class="train-wrap">
            <img class="train" src="Source/TRAIN.png" alt="kereta">
        </div>

        <div class="ground">
            <div class="pillar"></div>
            <div class="grass-left"></div>
            <div class="grass-right"></div>
        </div>

        <div class ="regist">
            <form id="registerForm" class="register-box" action="homepage.html">
               
                <div class="input-group">
                    <label>Nama</label>
                    <input type="text" placeholder="Masukkan nama anda sesuai KTP" id ="nama">
                </div>
    
                <div class="input-group">
                    <label>Email</label>
                    <input type="text" placeholder="Masukkan email anda" id="email">
                </div>
    
                <div class="input-group">
                    <label>Kata sandi</label>
                    <input type="text" placeholder="Masukkan kata sandi anda" id ="pass">
                </div>
    
                <button type="submit">Login</button>
            </form>
        </div>

        <script src="js/login.js"></script>

    </div>
</body>
</html>
